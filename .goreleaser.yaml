version: 2

project_name: clickstats

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: "checksums.txt"

homebrew:
  - name: clickstats
    repository:
      owner: chris-short
      name: homebrew-clickstats
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/chris-short/clickstats"
    description: "Click analytics dashboard for Buttondown newsletters"
    license: "MIT"
    install: |
      bin.install "clickstats"
    test: |
      assert_match "BUTTONDOWN_API_KEY not set", shell_output("#{bin}/clickstats 2>&1", 1)
