<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Click Stats</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"
          integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ"
          crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #0f0f1a; color: #e2e8f0; font-family: system-ui, sans-serif; font-size: 14px; }

    /* ---- Header ---- */
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px; border-bottom: 1px solid #1e1e3a;
    }
    header h1 { font-size: 16px; font-weight: 600; }
    #last-refreshed { color: #6b7280; font-size: 12px; white-space: nowrap; }

    /* ---- Stats bar ---- */
    #stats-bar { display: flex; border-bottom: 1px solid #1e1e3a; }
    .stat { flex: 1; padding: 14px 20px; border-right: 1px solid #1e1e3a; min-width: 0; }
    .stat:last-child { border-right: none; }
    .stat-value { font-size: 28px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .stat-label { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: .06em; margin-top: 3px; }

    /* ---- Nav ---- */
    #nav {
      display: flex; border-bottom: 1px solid #1e1e3a;
      overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    #nav::-webkit-scrollbar { display: none; }
    .nav-btn {
      flex-shrink: 0; background: none; border: none; border-bottom: 2px solid transparent;
      color: #6b7280; padding: 11px 22px; font-size: 13px; font-weight: 500;
      cursor: pointer; white-space: nowrap; transition: color .15s;
    }
    .nav-btn:hover { color: #c4c9d4; }
    .nav-btn.active { color: #e2e8f0; border-bottom-color: #4f46e5; }

    /* ---- Tab panes ---- */
    .tab-pane { display: none; padding: 24px 20px; }
    .tab-pane.active { display: block; }

    /* ---- Charts ---- */
    .chart-section { margin-bottom: 36px; }
    .section-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
    }
    .section-title { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: .07em; }
    .chart-wrap { position: relative; height: 520px; }
    .chart-wrap.md  { height: 400px; }
    .chart-wrap.sm  { height: 240px; }

    /* ---- Controls ---- */
    .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    input[type=number], input[type=text], input[type=search] {
      background: #1a1a2e; border: 1px solid #2a2a3e; color: #e2e8f0;
      padding: 7px 11px; border-radius: 5px; font-size: 13px;
    }
    input[type=number] { width: 96px; }
    input[type=search]  { width: 240px; }
    input::placeholder { color: #4b5563; }
    button {
      background: #4f46e5; color: #fff; border: none; padding: 7px 16px;
      border-radius: 5px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background .15s;
    }
    button:hover { background: #4338ca; }
    button.green { background: #059669; }
    button.green:hover { background: #047857; }
    button.muted { background: #374151; }
    button.muted:hover { background: #4b5563; }

    /* ---- Placeholder ---- */
    .placeholder { color: #4b5563; font-size: 13px; padding: 80px 0; text-align: center; }

    /* ---- Modal ---- */
    #modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65);
      align-items: center; justify-content: center; z-index: 10;
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 8px;
      padding: 24px; width: min(400px, 92vw);
    }
    #modal h3 { font-size: 15px; margin-bottom: 16px; }
    #modal label { display: block; font-size: 11px; color: #6b7280; text-transform: uppercase; margin-bottom: 6px; }
    #modal input[type=text] { width: 100%; margin-bottom: 18px; }
    #modal .actions { display: flex; gap: 8px; }

    /* ---- Mobile ---- */
    @media (max-width: 600px) {
      .stat { padding: 10px 14px; }
      .stat-value { font-size: 22px; }
      .stat-label { font-size: 9px; }
      .tab-pane { padding: 16px; }
      .chart-wrap      { height: 360px; }
      .chart-wrap.md   { height: 300px; }
      .chart-wrap.sm   { height: 180px; }
      input[type=search] { width: 100%; }
      header h1 { font-size: 14px; }
      #last-refreshed { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1 id="site-title">Click Stats</h1>
  <span id="last-refreshed"></span>
</header>

<div id="stats-bar">
  <div class="stat">
    <div class="stat-value" id="total-clicks">-</div>
    <div class="stat-label">Total Clicks</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="issues-sent">-</div>
    <div class="stat-label">Issues Sent</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="avg-clicks">-</div>
    <div class="stat-label">Avg / Issue</div>
  </div>
</div>

<nav id="nav">
  <button class="nav-btn active" data-tab="overview"  onclick="switchTab('overview')">Overview</button>
  <button class="nav-btn"        data-tab="issues"    onclick="switchTab('issues')">Issues</button>
  <button class="nav-btn"        data-tab="domains"   onclick="switchTab('domains')">Domains</button>
</nav>

<!-- Overview -->
<div id="tab-overview" class="tab-pane active">
  <div class="chart-section">
    <div class="section-header">
      <span class="section-title">All Time Top Links</span>
    </div>
    <div class="chart-wrap"><canvas id="alltime-chart"></canvas></div>
  </div>
  <div class="chart-section">
    <div class="section-header">
      <span class="section-title">Click Trend - Last 10 Issues</span>
    </div>
    <div class="chart-wrap sm"><canvas id="trend-chart"></canvas></div>
  </div>
</div>

<!-- Issues -->
<div id="tab-issues" class="tab-pane">
  <div class="section-header" style="margin-bottom:20px">
    <span class="section-title">Issue Breakdown</span>
    <div class="controls">
      <input type="number" id="issue-input" placeholder="Issue #" min="1">
      <button onclick="loadIssue()">Go</button>
      <button class="green" onclick="openModal()">PDF Report</button>
    </div>
  </div>
  <div id="issue-placeholder" class="placeholder">Enter an issue number and click Go</div>
  <div class="chart-wrap md" id="issue-chart-wrap" style="display:none">
    <canvas id="issue-chart"></canvas>
  </div>
</div>

<!-- Domains -->
<div id="tab-domains" class="tab-pane">
  <div class="section-header" style="margin-bottom:20px">
    <span class="section-title" id="domains-title">Top Domains</span>
    <div class="controls">
      <input type="search" id="domain-search" placeholder="Filter domains..." oninput="filterDomains()">
    </div>
  </div>
  <div class="chart-wrap"><canvas id="domains-chart"></canvas></div>
</div>

<!-- PDF modal -->
<div id="modal-overlay">
  <div id="modal">
    <h3>Generate Sponsor PDF</h3>
    <label>Sponsor URL (optional)</label>
    <input type="text" id="sponsor-url" placeholder="https://sponsor.example.com/...">
    <div class="actions">
      <button onclick="exportPdf()">Export</button>
      <button class="muted" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
  let alltimeChart = null, issueChart = null, trendChart = null, domainsChart = null;
  let currentIssue = null;
  let allDomains   = [];

  const GRID  = '#1e1e3a';
  const TICK  = '#9ca3af';
  const BASE  = { animation: false, maintainAspectRatio: false, plugins: { legend: { display: false } } };

  // Human-readable number: 1234 -> "1.2k"
  function fmtNum(n) {
    if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1) + 'k';
    return String(n);
  }

  // Clean URL label: strip scheme and www, truncate so total length <= 32 chars
  function formatURL(raw) {
    try {
      const u    = new URL(raw);
      const host = u.hostname.replace(/^www\./, '');
      let   path = u.pathname;
      const max  = Math.max(1, 32 - host.length);
      if (path.length > max) path = path.slice(0, max - 1) + '…';
      return host + path;
    } catch {
      return raw.replace(/^https?:\/\//, '').slice(0, 32);
    }
  }

  // Shared options for horizontal bar charts
  function hBarOpts(fullLabels) {
    return {
      ...BASE,
      indexAxis: 'y',
      scales: {
        x: { grid: { color: GRID }, ticks: { color: TICK, callback: fmtNum } },
        y: { grid: { display: false }, ticks: { color: TICK, font: { size: 11 } } },
      },
      plugins: {
        ...BASE.plugins,
        tooltip: { callbacks: {
          title:  (items) => fullLabels[items[0].dataIndex],
          label:  (ctx)   => '  ' + ctx.parsed.x.toLocaleString() + ' clicks',
        }},
      },
    };
  }

  function renderHBar(canvasId, labels, data, color, fullLabels, existing) {
    if (existing) existing.destroy();
    if (!data || !data.length) return null;
    return new Chart(document.getElementById(canvasId), {
      type: 'bar',
      data: { labels, datasets: [{ data, backgroundColor: color, borderRadius: 3 }] },
      options: hBarOpts(fullLabels),
    });
  }

  // --- Tab switching ---
  function switchTab(name) {
    document.querySelectorAll('.nav-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.tab === name));
    document.querySelectorAll('.tab-pane').forEach(p =>
      p.classList.toggle('active', p.id === 'tab-' + name));
    if (name === 'domains' && allDomains.length === 0) loadDomains();
  }

  // --- Data loaders ---
  async function loadConfig() {
    try {
      const r = await fetch('/api/config');
      if (!r.ok) return;
      const d = await r.json();
      const title = d.name + ' Click Stats';
      document.title = title;
      document.getElementById('site-title').textContent = title;
    } catch (err) { console.error('loadConfig:', err); }
  }

  async function loadAllTime() {
    try {
      const r = await fetch('/api/stats');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      document.getElementById('total-clicks').textContent = d.total_clicks.toLocaleString();
      document.getElementById('issues-sent').textContent  = d.issues_sent.toLocaleString();
      document.getElementById('avg-clicks').textContent   = d.avg_clicks_per_issue.toLocaleString();
      document.getElementById('last-refreshed').textContent =
        'Refreshed ' + new Date().toLocaleTimeString();
      const labels = d.top_links.map(l => formatURL(l.url));
      alltimeChart  = renderHBar(
        'alltime-chart', labels, d.top_links.map(l => l.clicks),
        '#059669', d.top_links.map(l => l.url), alltimeChart
      );
    } catch (err) {
      console.error('loadAllTime:', err);
      document.getElementById('last-refreshed').textContent = 'Error loading stats';
    }
  }

  async function loadTrend() {
    try {
      const r = await fetch('/api/issues');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d   = await r.json();
      const issues = d.issues.slice().sort((a, b) => a.number - b.number);
      if (trendChart) trendChart.destroy();
      trendChart = new Chart(document.getElementById('trend-chart'), {
        type: 'bar',
        data: {
          labels: issues.map(i => '#' + i.number),
          datasets: [{
            data: issues.map(i => i.total_clicks),
            backgroundColor: issues.map(i =>
              currentIssue && i.number === parseInt(currentIssue) ? '#818cf8' : '#4f46e5'
            ),
            borderRadius: 3,
          }],
        },
        options: {
          ...BASE,
          scales: {
            x: { grid: { display: false }, ticks: { color: TICK } },
            y: { grid: { color: GRID }, ticks: { color: TICK, callback: fmtNum } },
          },
          plugins: {
            ...BASE.plugins,
            tooltip: { callbacks: {
              label: (ctx) => '  ' + ctx.parsed.y.toLocaleString() + ' clicks',
            }},
          },
        },
      });
    } catch (err) { console.error('loadTrend:', err); }
  }

  async function loadIssue() {
    const n = document.getElementById('issue-input').value.trim();
    if (!n) return;
    try {
      const r = await fetch('/api/stats/issue/' + n);
      if (!r.ok) {
        const ph = document.getElementById('issue-placeholder');
        ph.textContent  = r.status === 404 ? 'Issue #' + n + ' not found.' : 'Error loading issue.';
        ph.style.display = 'block';
        document.getElementById('issue-chart-wrap').style.display = 'none';
        return;
      }
      const d = await r.json();
      currentIssue = n;
      document.getElementById('issue-placeholder').style.display  = 'none';
      document.getElementById('issue-chart-wrap').style.display   = 'block';
      const labels = d.links.map(l => formatURL(l.url));
      issueChart   = renderHBar(
        'issue-chart', labels, d.links.map(l => l.clicks),
        '#4f46e5', d.links.map(l => l.url), issueChart
      );
      loadTrend();
    } catch (err) { console.error('loadIssue:', err); }
  }

  async function loadDomains() {
    try {
      const r = await fetch('/api/domains');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d   = await r.json();
      allDomains  = d.domains;
      renderDomains(allDomains.slice(0, 20));
    } catch (err) { console.error('loadDomains:', err); }
  }

  function filterDomains() {
    const q        = document.getElementById('domain-search').value.toLowerCase().trim();
    const filtered = q ? allDomains.filter(d => d.domain.includes(q)) : allDomains;
    const shown    = filtered.slice(0, 20);
    renderDomains(shown);
    document.getElementById('domains-title').textContent = q
      ? filtered.length + ' domain' + (filtered.length !== 1 ? 's' : '') + ' matching "' + q + '"'
      : 'Top Domains';
  }

  function renderDomains(domains) {
    if (domainsChart) domainsChart.destroy();
    if (!domains.length) { domainsChart = null; return; }
    const links = domains.map(d => d.links);
    domainsChart = new Chart(document.getElementById('domains-chart'), {
      type: 'bar',
      data: {
        labels: domains.map(d => d.domain),
        datasets: [{ data: domains.map(d => d.clicks), backgroundColor: '#7c3aed', borderRadius: 3 }],
      },
      options: {
        ...BASE,
        indexAxis: 'y',
        scales: {
          x: { grid: { color: GRID }, ticks: { color: TICK, callback: fmtNum } },
          y: { grid: { display: false }, ticks: { color: TICK, font: { size: 12 } } },
        },
        plugins: {
          ...BASE.plugins,
          tooltip: { callbacks: {
            title: (items) => domains[items[0].dataIndex].domain,
            label: (ctx)   => [
              '  ' + ctx.parsed.x.toLocaleString() + ' clicks',
              '  ' + links[ctx.dataIndex] + ' unique link' + (links[ctx.dataIndex] !== 1 ? 's' : ''),
            ],
          }},
        },
      },
    });
  }

  // --- PDF modal ---
  function openModal() {
    if (!currentIssue) { alert('Load an issue first.'); return; }
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('sponsor-url').focus();
  }
  function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
  function exportPdf() {
    const sponsor = document.getElementById('sponsor-url').value.trim();
    let url = '/print/issue/' + currentIssue;
    if (sponsor) url += '?sponsor=' + encodeURIComponent(sponsor);
    window.open(url, '_blank');
    closeModal();
  }

  // --- Event listeners ---
  document.getElementById('issue-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadIssue();
  });
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  // Initial load + 5-minute auto-refresh
  Promise.all([loadConfig(), loadAllTime(), loadTrend()]);
  setInterval(() => Promise.all([loadAllTime(), loadTrend()]), 5 * 60 * 1000);
</script>
</body>
</html>
